[package]
name = "marcterm"
edition = "2024"
publish = true
description = "my terminal as you might have guessed by the name"
version = "0.1.4"
license = "MIT"
repository = "https://github.com/marc2332/marcterm"

[[bin]]
name = "marcterm"
path = "src/main.rs"

[dependencies]
freya = { version = "0.4.0-rc.12", features = [
  "terminal",
  "radio",
  "material-design",
  "icons",
] }
serde = { version = "1", features = ["derive"] }
toml = "0.9"
dirs = "6"
